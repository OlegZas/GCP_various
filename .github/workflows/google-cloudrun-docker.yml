name: 'Build and Deploy to Cloud Run'

on:
  push:
    branches:
      - 'main'

env:
  PROJECT_ID: 'migration-490817'
  REGION: 'us-central1' 
  JOB_NAME: 'bq-to-postgres-job'
  REPO: 'bq-to-postgres-job' # The name of the Artifact Registry repository
  IMAGE: 'etl-image'         # A distinct name for the image inside the repo
  WORKLOAD_IDENTITY_PROVIDER: 'projects/670248038234/locations/global/workloadIdentityPools/github-pool/providers/github-provider'

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@v4'

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: 'bq-to-postgres@migration-490817.iam.gserviceaccount.com'

      - name: 'Docker Auth'
        run: |-
          gcloud auth print-access-token | docker login -u oauth2accesstoken --password-stdin https://us-central1-docker.pkg.dev

      - name: 'Build and Push Container'
        run: |-
          # The path is now explicitly constructed to avoid duplicate naming confusion
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}"
          
          docker build --tag "${IMAGE_PATH}" ./BQ_to_Postgres_etl
          docker push "${IMAGE_PATH}"

      - name: 'Deploy to Cloud Run Job'
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          job: '${{ env.JOB_NAME }}'
          region: '${{ env.REGION }}'
          image: '${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}'
          env_vars: |-
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_NAME=${{ secrets.DB_NAME }}
          flags: |-
            --service-account=bq-to-postgres@migration-490817.iam.gserviceaccount.com
            --vpc-connector=projects/migration-490817/locations/us-central1/connectors/bq-to-postgres-conn
            --egress=private-ranges-only

      - name: 'Execute Cloud Run Job (Optional)'
        run: |-
          gcloud run jobs execute ${{ env.JOB_NAME }} --region ${{ env.REGION }} --wait
